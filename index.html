<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>主廚上菜</title>
<style>
:root{color-scheme:light;--ink:#201a17;--muted:#6b625c;--line:#eadfd5;--paper:#fffaf3;--card:#fff;--accent:#e15f30;--accent-2:#15866c;--soft:#fff0df;--shadow:0 20px 60px rgba(96,52,27,.16)}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(135deg,#fff7ed 0%,#f7f3e8 46%,#eaf7f0 100%);color:var(--ink)}
button,input,textarea{font:inherit}
button{border:0;cursor:pointer}
img{max-width:100%;display:block}
.hidden{display:none!important}
.app{width:min(1180px,calc(100% - 28px));margin:0 auto;padding:24px 0 40px}
.screen{animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}}
.home{min-height:calc(100vh - 48px);display:grid;grid-template-columns:minmax(0,1fr) 390px;align-items:center;gap:28px}
.home-visual{position:relative;min-height:620px;border-radius:8px;overflow:hidden;box-shadow:var(--shadow);background:#111}
.home-visual img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.home-visual:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.38),rgba(0,0,0,.04) 58%,rgba(0,0,0,.12))}
.home-copy{position:absolute;z-index:1;left:34px;right:34px;bottom:34px;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.45)}
.eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.88);color:#9a3412;font-size:13px;font-weight:900;text-shadow:none}
h1{margin:16px 0 10px;font-size:clamp(42px,6vw,78px);line-height:.96;letter-spacing:0}
.home-copy p{margin:0;max-width:640px;font-size:17px;line-height:1.8}
.start-panel{background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.72);box-shadow:var(--shadow);border-radius:8px;padding:24px}
.start-panel h2,.section-title{margin:0 0 12px;font-size:28px;letter-spacing:0}
.start-panel p{margin:0;color:var(--muted);line-height:1.8}
.flow{display:grid;gap:10px;margin:20px 0}
.flow-item{display:grid;grid-template-columns:42px 1fr;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);border-radius:8px;background:#fff}
.flow-item strong{font-size:14px}.flow-item span{font-size:13px;color:var(--muted)}
.icon-dot{width:42px;height:42px;display:grid;place-items:center;border-radius:999px;background:#fff0df;font-size:22px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}
.brand{display:flex;align-items:center;gap:12px;font-weight:900;font-size:18px}
.brand-mark{width:42px;height:42px;display:grid;place-items:center;border-radius:8px;background:#201a17;color:#fff}
.pill{display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);color:#7c2d12;font-weight:900;font-size:13px}
.grid{display:grid;grid-template-columns:1fr 360px;gap:20px}
.card{background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.72);border-radius:8px;box-shadow:var(--shadow);overflow:hidden}
.card-pad{padding:22px}
.dish-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.dish-card{padding:0;background:#fff;border:2px solid transparent;border-radius:8px;overflow:hidden;text-align:left;color:inherit;box-shadow:0 10px 28px rgba(96,52,27,.08);transition:.18s}
.dish-card:hover{transform:translateY(-2px);border-color:#f0b18d}
.dish-card.active{border-color:var(--accent);box-shadow:0 16px 36px rgba(225,95,48,.2)}
.dish-card img{width:100%;aspect-ratio:4/3;object-fit:cover;background:#f4eee4}
.dish-card-content{padding:12px}
.dish-card h3{margin:0 0 6px;font-size:17px}
.dish-card p{margin:0;color:var(--muted);font-size:12px;line-height:1.55}
.side-preview img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;background:#f4eee4}
.ingredient-cloud{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:8px 10px;border-radius:999px;background:#fff7ed;border:1px solid #fed7aa;font-weight:800;font-size:13px}
.btn{width:100%;min-height:50px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;font-weight:900;text-decoration:none;transition:.18s}
.primary{background:#201a17;color:#fff}.primary:hover:not(:disabled){filter:brightness(1.06);transform:translateY(-1px)}
.secondary{background:#fff;color:#201a17;border:1px solid var(--line)}
.ghost{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}
.btn:disabled{background:#e7e0d9;color:#9d948d;cursor:not-allowed;transform:none}
.game-layout{display:grid;grid-template-columns:360px 1fr;gap:20px}
.level-image{width:100%;aspect-ratio:4/3;object-fit:cover;background:#f4eee4}
.steps{display:grid;gap:8px;margin-top:14px}
.step-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 12px;border-radius:8px;background:#faf7f2;border:1px solid var(--line);color:#867b72;font-weight:900;font-size:13px}
.step-row.current{background:#fff0df;color:#9a3412;border-color:#fdba74}
.step-row.done{background:#e3f7ee;color:#047857;border-color:#8ce2bd}
.level-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:14px}
.level-head h2{margin:4px 0 6px;font-size:32px}
.level-head p{margin:0;color:var(--muted);line-height:1.6}
.progress{height:12px;border-radius:999px;background:#efe7dd;overflow:hidden;margin:16px 0 18px}
.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,#e15f30,#19a37c);transition:.2s}
.hint{padding:13px 14px;border-radius:8px;background:#fff7ed;color:#7c2d12;line-height:1.7;font-weight:750;margin-bottom:14px}
.ingredient-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.pick{min-height:74px;border-radius:8px;background:#fff;border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--ink);font-weight:900}
.pick b{font-size:24px}.pick span{font-size:13px;text-align:center}
.pick.selected{background:#e3f7ee;border-color:#19a37c;color:#065f46}
.board{position:relative;min-height:310px;border-radius:8px;overflow:hidden;background:#c9925f;box-shadow:inset 0 -14px 24px rgba(88,47,20,.2)}
.board:before{content:"";position:absolute;inset:12px;border-radius:8px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.08) 0 9px,rgba(80,43,18,.06) 9px 18px)}
.cut-target{position:absolute;left:50%;top:49%;transform:translate(-50%,-50%);width:132px;height:132px;border-radius:999px;background:rgba(255,255,255,.42);display:grid;place-items:center;font-size:66px;box-shadow:0 16px 30px rgba(85,47,20,.18)}
.cut-target.hit{animation:hit .25s ease}
@keyframes hit{50%{transform:translate(-50%,-50%) scale(.86) rotate(-6deg)}}
.board-label{position:absolute;left:50%;top:18px;transform:translateX(-50%);z-index:2;padding:9px 14px;border-radius:999px;background:rgba(255,255,255,.82);font-weight:900;color:#6b3f20;white-space:nowrap}
.knife{position:absolute;right:58px;top:70px;font-size:54px;z-index:2;transform:rotate(-18deg)}
.knife.move{animation:knife .25s ease}
@keyframes knife{50%{transform:rotate(-42deg) translate(-26px,32px)}}
.meter{position:relative;height:76px;border-radius:8px;background:linear-gradient(90deg,#2b211e,#7c2d12 38%,#f59e0b 50%,#7c2d12 62%,#2b211e);overflow:hidden}
.sweet-zone{position:absolute;left:43%;top:0;width:18%;height:100%;background:rgba(255,255,255,.28);box-shadow:0 0 30px rgba(250,204,21,.8)}
.needle{position:absolute;top:8px;bottom:8px;width:7px;border-radius:999px;background:#fff;left:10%;transform:translateX(-50%);box-shadow:0 0 16px rgba(255,255,255,.85)}
.score-dots{display:flex;gap:10px;justify-content:center;margin:14px 0;font-size:28px}
.dim{opacity:.28;filter:grayscale(1)}
.heat-panel{display:grid;gap:12px}
.thermo{position:relative;height:82px;border-radius:8px;background:linear-gradient(90deg,#bfdbfe,#fef3c7 48%,#fecaca);overflow:hidden}
.heat-zone{position:absolute;top:0;height:100%;background:rgba(16,185,129,.36);border-left:3px solid #059669;border-right:3px solid #059669}
.temp{position:absolute;top:8px;bottom:8px;width:8px;border-radius:999px;background:#201a17;left:20%;transform:translateX(-50%)}
.heat-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.heat-buttons button,.plating-token{min-height:56px;border-radius:8px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--ink)}
.heat-buttons button.active{background:#201a17;color:#fff}
.status{min-height:46px;padding:12px;border-radius:8px;background:#faf7f2;color:#5f554f;text-align:center;font-weight:850;line-height:1.5}
.good{background:#e3f7ee!important;color:#047857!important}.bad{background:#fee2e2!important;color:#b91c1c!important}
.plate-zone{position:relative;min-height:350px;border-radius:8px;background:radial-gradient(circle at 50% 52%,#fff 0 28%,#f4eee4 29% 42%,#fffaf3 43%);border:2px dashed #f59e0b;overflow:hidden}
.target-ring{position:absolute;border:3px dashed rgba(225,95,48,.55);border-radius:999px;animation:pulse 1.1s infinite ease-in-out}
@keyframes pulse{50%{transform:scale(1.08);opacity:.72}}
.placed{position:absolute;display:grid;place-items:center;border-radius:999px;background:rgba(255,255,255,.86);box-shadow:0 12px 24px rgba(96,52,27,.15);font-size:32px}
.plating-tools{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
.plating-token.used{opacity:.35;filter:grayscale(1);pointer-events:none}
.postcard-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:20px}
.postcard{position:relative;min-height:520px;border-radius:8px;background:#fffaf3;border:2px dashed #f59e0b;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px;overflow:hidden}
.postcard:before{content:"";position:absolute;left:0;right:0;top:0;height:12px;background:repeating-linear-gradient(90deg,#dc2626 0 18px,#fff 18px 36px,#2563eb 36px 54px,#fff 54px 72px)}
.post-left,.post-right{background:rgba(255,255,255,.78);border-radius:8px;padding:20px;display:flex;flex-direction:column;justify-content:space-between}
.post-left small{color:#e15f30;font-weight:900;letter-spacing:.18em}
.post-left h2{font-size:40px;line-height:1.08;margin:10px 0}
.post-left p{color:var(--muted);line-height:1.75}
.post-right{align-items:center;justify-content:center;text-align:center}
.post-right img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;box-shadow:0 16px 36px rgba(96,52,27,.18)}
.stamp{margin-top:12px;padding:9px 14px;border-radius:999px;background:#fff0df;color:#9a3412;font-weight:900}
label{display:block;margin:14px 0 8px;font-weight:900}
textarea{width:100%;min-height:132px;resize:vertical;border:1px solid var(--line);border-radius:8px;padding:12px;background:#fff;outline:none}
textarea:focus{border-color:#f59e0b}
.actions{display:flex;gap:10px;margin-top:14px}.actions .btn{margin:0}
@media(max-width:980px){.home,.grid,.game-layout,.postcard-grid,.postcard{grid-template-columns:1fr}.home-visual{min-height:540px}.dish-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.app{width:min(100% - 18px,1180px);padding-top:10px}.home-visual{min-height:520px}.home-copy{left:18px;right:18px;bottom:20px}.topbar{align-items:flex-start;flex-direction:column}.dish-grid,.ingredient-grid,.heat-buttons,.plating-tools{grid-template-columns:1fr 1fr}.level-head{display:block}.post-left h2{font-size:30px}}
</style>
</head>
<body>
<main class="app">
  <section id="homeScreen" class="screen home">
    <div class="home-visual">
      <img src="assets/home.png" alt="主廚上菜遊戲首頁">
      <div class="home-copy">
        <span class="eyebrow">主廚任務開張</span>
        <h1>主廚上菜</h1>
        <p>選一道想完成的料理，照著關卡完成挑食材、切配、爆香、控火與擺盤，最後把成品料理放進自己的美食明信片。</p>
      </div>
    </div>
    <aside class="start-panel">
      <h2>今日出餐流程</h2>
      <p>八道料理、五個關卡、完成後產生一張可下載的主廚明信片。</p>
      <div class="flow">
        <div class="flow-item"><div class="icon-dot">🥬</div><div><strong>挑出正確食材</strong><br><span>依料理需求選材料</span></div></div>
        <div class="flow-item"><div class="icon-dot">🔪</div><div><strong>切配備料</strong><br><span>每個食材切兩刀</span></div></div>
        <div class="flow-item"><div class="icon-dot">🔥</div><div><strong>爆香與控火</strong><br><span>抓時機、穩溫度</span></div></div>
        <div class="flow-item"><div class="icon-dot">✨</div><div><strong>擺盤成明信片</strong><br><span>把料理照片放進卡片</span></div></div>
      </div>
      <button id="homeStartBtn" class="btn primary" type="button">開始遊戲</button>
    </aside>
  </section>

  <section id="menuScreen" class="screen hidden">
    <div class="topbar">
      <div class="brand"><div class="brand-mark">🍳</div><span>主廚上菜</span></div>
      <span class="pill" id="currentDishPill">目前料理</span>
    </div>
    <div class="grid">
      <article class="card"><div class="card-pad">
        <h2 class="section-title">選擇今日料理</h2>
        <div id="dishGrid" class="dish-grid"></div>
      </div></article>
      <aside class="card side-preview"><div class="card-pad">
        <img id="menuDishImage" src="" alt="目前選擇料理">
        <h2 id="menuDishTitle" class="section-title" style="margin-top:16px"></h2>
        <p id="menuDishIntro" style="color:var(--muted);line-height:1.75;margin:0"></p>
        <div id="menuIngredients" class="ingredient-cloud"></div>
        <button id="menuStartBtn" class="btn primary" type="button" style="margin-top:18px">進入第一關</button>
      </div></aside>
    </div>
  </section>

  <section id="gameScreen" class="screen hidden">
    <div class="topbar">
      <div class="brand"><div class="brand-mark">🍳</div><span>主廚上菜</span></div>
      <span class="pill" id="gameDishPill"></span>
    </div>
    <div class="game-layout">
      <aside class="card">
        <img id="levelImage" class="level-image" src="" alt="關卡圖片">
        <div class="card-pad">
          <div id="steps" class="steps"></div>
          <button id="backMenuBtn" class="btn secondary" type="button" style="margin-top:14px">重選料理</button>
        </div>
      </aside>
      <article class="card"><div class="card-pad">
        <div class="level-head">
          <div>
            <span id="levelCount" class="pill"></span>
            <h2 id="levelTitle"></h2>
            <p id="levelHint"></p>
          </div>
        </div>
        <div class="progress"><span id="progressBar"></span></div>
        <div id="levelContent"></div>
        <div class="actions">
          <button id="prevBtn" class="btn secondary" type="button">上一關</button>
          <button id="nextBtn" class="btn primary" type="button">下一關</button>
        </div>
      </div></article>
    </div>
  </section>

  <section id="postcardScreen" class="screen hidden">
    <div class="topbar">
      <div class="brand"><div class="brand-mark">✉️</div><span>主廚明信片</span></div>
      <span class="pill" id="postDishPill"></span>
    </div>
    <div class="postcard-grid">
      <article class="card"><div class="card-pad">
        <div id="postcard" class="postcard">
          <div class="post-left">
            <div>
              <small>CHEF POSTCARD</small>
              <h2 id="postTitle"></h2>
              <p id="postMessage"></p>
            </div>
            <div>
              <div id="postChips" class="ingredient-cloud"></div>
              <p style="margin:14px 0 0;color:var(--muted);font-weight:850">完成流程：挑食材、切配、爆香、控火、擺盤</p>
            </div>
          </div>
          <div class="post-right">
            <img id="postImage" src="" alt="完成料理圖片">
            <div class="stamp">主廚認證完成</div>
          </div>
        </div>
      </div></article>
      <aside class="card"><div class="card-pad">
        <h2 class="section-title">寫下料理心情</h2>
        <label for="messageInput">明信片文字</label>
        <textarea id="messageInput" maxlength="90" placeholder="例如：今天完成了一道香氣滿滿的料理，送給正在努力的自己。"></textarea>
        <div class="actions">
          <button id="downloadPngBtn" class="btn primary" type="button">下載 PNG</button>
          <button id="downloadJpgBtn" class="btn ghost" type="button">下載 JPG</button>
        </div>
        <button id="againBtn" class="btn secondary" type="button" style="margin-top:10px">再玩一次</button>
        <div id="downloadStatus" class="status" style="margin-top:12px">明信片會使用你選的料理成品圖。</div>
      </div></aside>
    </div>
  </section>
</main>

<script>
const $=s=>document.querySelector(s);
const asset=p=>"assets/"+p;
const iconMap={白飯:"🍚",雞肉:"🍗",九層塔:"🌿",醬油:"🥄",蒜頭:"🧄",南瓜:"🎃",鮮奶油:"🥛",洋蔥:"🧅",高湯:"🍲",咖哩:"🍛",紅蘿蔔:"🥕",馬鈴薯:"🥔",番茄:"🍅",義大利麵:"🍝",起司:"🧀",牛肉:"🥩",黑胡椒:"⚫",青椒:"🫑",蝦仁:"🍤",雞蛋:"🥚",蔥花:"🌱",米飯:"🍚",櫛瓜:"🥒",蘑菇:"🍄",豆腐:"⬜",彩椒:"🫑"};
const dishes=[
 {id:"curry",name:"咖哩飯",img:"dish-curry-rice.png",intro:"金黃咖哩包住白飯，適合第一位出餐的暖心料理。",ingredients:["白飯","咖哩","雞肉","紅蘿蔔","馬鈴薯"],plate:"把咖哩淋在白飯旁，保留一點金黃流動感。"},
 {id:"risotto",name:"蔬菜燉飯",img:"dish-veggie-risotto.png",intro:"米飯吸滿蔬菜香氣，完成一盤柔和的義式燉飯。",ingredients:["米飯","蘑菇","櫛瓜","起司","洋蔥"],plate:"讓米粒鋪成圓形，再用綠色蔬菜點出層次。"},
 {id:"pasta",name:"番茄奶香義麵",img:"dish-tomato-cream-pasta.png",intro:"番茄酸甜和奶香交在一起，麵條要收得滑順。",ingredients:["義大利麵","番茄","鮮奶油","起司","蒜頭"],plate:"麵條捲高，最後撒上起司和番茄色澤。"},
 {id:"beef",name:"黑胡椒牛肉飯",img:"dish-black-pepper-beef-rice.png",intro:"牛肉大火快炒，黑胡椒香氣是這道菜的主角。",ingredients:["白飯","牛肉","黑胡椒","青椒","洋蔥"],plate:"牛肉集中在飯旁，醬汁做出飽滿的深色光澤。"},
 {id:"shrimp",name:"鮮蝦蛋炒飯",img:"dish-shrimp-fried-rice.png",intro:"炒飯要粒粒分明，鮮蝦和蛋香是通關重點。",ingredients:["米飯","蝦仁","雞蛋","蔥花","蒜頭"],plate:"炒飯堆成小山，鮮蝦擺在最醒目的位置。"},
 {id:"chicken",name:"三杯塔香雞丁",img:"dish-three-cup-chicken.png",intro:"醬香、九層塔、雞丁一起爆香，收汁後最迷人。",ingredients:["雞肉","九層塔","醬油","蒜頭","洋蔥"],plate:"雞丁集中上色，九層塔放在頂端完成香氣。"},
 {id:"soup",name:"南瓜濃湯",img:"dish-pumpkin-soup.png",intro:"南瓜煮到綿密，奶香和高湯讓濃湯更順口。",ingredients:["南瓜","鮮奶油","洋蔥","高湯","蒜頭"],plate:"濃湯保持平滑，中心用奶油線條點亮。"},
 {id:"tofu",name:"香煎蔬菜豆腐",img:"dish-pan-fried-veggie-tofu.png",intro:"豆腐外酥內嫩，彩色蔬菜讓擺盤更清爽。",ingredients:["豆腐","櫛瓜","彩椒","蘑菇","醬油"],plate:"豆腐排成主角，蔬菜在旁邊做成彩色邊線。"}
];
const levels=[
 {key:"ingredients",title:"挑選食材",img:"level-1.png",hint:"從食材區選出這道料理真正需要的材料。"},
 {key:"cut",title:"切配備料",img:"level-2.png",hint:"每個食材點擊切兩刀，全部處理完才能進下一關。"},
 {key:"aroma",title:"辛香爆香",img:"level-3.png",hint:"指針進入中央香氣區時翻炒，成功三次。"},
 {key:"heat",title:"火候烹調",img:"level-4-heat.png",hint:"依序完成小火、中火、大火三段溫度。"},
 {key:"plate",title:"擺盤上菜",img:"level-5-plating.png",hint:"依提示把每個擺盤元素放到正確順序。"}
];
const wrongIngredients=["高麗菜","玉米","培根","檸檬","香菜","青花菜","辣椒","奶油","花椰菜","蘋果","海苔","芝麻"];
const heatStages=[{name:"小火入味",min:35,max:47},{name:"中火收汁",min:55,max:68},{name:"大火上色",min:76,max:88}];
const S={dishId:dishes[0].id,screen:"home",level:0,chosen:[],options:[],cutIndex:0,cutHits:0,cutTotal:0,cutMove:false,needle:8,dir:1,aromaScore:0,aromaTimer:null,heatTemp:24,heatPower:0,heatStage:0,heatProgress:[0,0,0],heatTimer:null,plateIndex:0,placed:[],status:""};
function dish(){return dishes.find(d=>d.id===S.dishId)||dishes[0]}
function icon(name){return iconMap[name]||"🥣"}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function stopAroma(){if(S.aromaTimer){clearInterval(S.aromaTimer);S.aromaTimer=null}}
function stopHeat(){if(S.heatTimer){clearInterval(S.heatTimer);S.heatTimer=null}}
function resetRun(){Object.assign(S,{level:0,chosen:[],cutIndex:0,cutHits:0,cutTotal:0,cutMove:false,needle:8,dir:1,aromaScore:0,heatTemp:24,heatPower:0,heatStage:0,heatProgress:[0,0,0],plateIndex:0,placed:[],status:""});prepOptions();stopAroma();stopHeat()}
function prepOptions(){let d=dish();S.options=shuffle([...d.ingredients,...shuffle(wrongIngredients.filter(x=>!d.ingredients.includes(x))).slice(0,7)])}
function setScreen(name){S.screen=name;["home","menu","game","postcard"].forEach(n=>$("#"+n+"Screen").classList.toggle("hidden",n!==name));if(name!=="game")stopAroma(),stopHeat()}
function renderMenu(){let d=dish();$("#currentDishPill").textContent="目前料理："+d.name;$("#dishGrid").innerHTML=dishes.map(x=>`<button class="dish-card ${x.id===S.dishId?"active":""}" type="button" data-dish="${x.id}"><img src="${asset(x.img)}" alt="${x.name}"><div class="dish-card-content"><h3>${x.name}</h3><p>${x.ingredients.map(icon).join(" ")} ${x.ingredients.join("、")}</p></div></button>`).join("");document.querySelectorAll("[data-dish]").forEach(b=>b.onclick=()=>{S.dishId=b.dataset.dish;resetRun();renderMenu()});$("#menuDishImage").src=asset(d.img);$("#menuDishTitle").textContent=d.name;$("#menuDishIntro").textContent=d.intro;$("#menuIngredients").innerHTML=d.ingredients.map(i=>`<span class="chip">${icon(i)} ${i}</span>`).join("")}
function renderSteps(){let h=levels.map((l,i)=>`<div class="step-row ${i<S.level?"done":i===S.level?"current":""}"><span>第 ${i+1} 關 ${l.title}</span><span>${i<S.level?"完成":i===S.level?"進行中":"待挑戰"}</span></div>`).join("");$("#steps").innerHTML=h}
function progress(){let d=dish(),key=levels[S.level].key;if(key==="ingredients")return S.chosen.filter(x=>d.ingredients.includes(x)).length/d.ingredients.length;if(key==="cut")return S.cutTotal/(d.ingredients.length*2);if(key==="aroma")return S.aromaScore/3;if(key==="heat")return (S.heatProgress.reduce((a,b)=>a+b,0))/300;if(key==="plate")return S.plateIndex/platingPlan().length;return 0}
function canNext(){let d=dish(),key=levels[S.level].key;if(key==="ingredients")return S.chosen.length===d.ingredients.length&&d.ingredients.every(i=>S.chosen.includes(i));if(key==="cut")return S.cutTotal>=d.ingredients.length*2;if(key==="aroma")return S.aromaScore>=3;if(key==="heat")return S.heatStage>=heatStages.length;if(key==="plate")return S.plateIndex>=platingPlan().length;return false}
function htmlIngredients(){let d=dish();let msg=S.chosen.length===0?"請選出正確食材。":canNext()?"食材正確，可以進下一關。":S.chosen.length>=d.ingredients.length?"有食材選錯，請重新檢查。":"繼續挑選需要的食材。";return `<div class="hint">本次料理需要：${d.ingredients.map(i=>`${icon(i)} ${i}`).join("、")}</div><div class="ingredient-grid">${S.options.map(i=>`<button class="pick ${S.chosen.includes(i)?"selected":""}" type="button" data-ing="${i}"><b>${icon(i)}</b><span>${i}</span></button>`).join("")}</div><div class="status ${canNext()?"good":S.chosen.length>=d.ingredients.length?"bad":""}" style="margin-top:14px">${msg}</div>`}
function htmlCut(){let d=dish(),cur=d.ingredients[Math.min(S.cutIndex,d.ingredients.length-1)],total=d.ingredients.length*2;return `<div class="hint">現在處理：${icon(cur)} ${cur}。每個食材切 2 刀，總進度 ${S.cutTotal} / ${total}。</div><button id="cutBoard" class="board" type="button"><div class="board-label">${cur} ${S.cutHits}/2 刀</div><div class="knife ${S.cutMove?"move":""}">🔪</div><div class="cut-target ${S.cutMove?"hit":""}">${icon(cur)}</div></button><div class="status" style="margin-top:14px">${"▰".repeat(S.cutTotal)}${"▱".repeat(Math.max(total-S.cutTotal,0))}</div>`}
function startAroma(){if(S.aromaTimer)return;S.aromaTimer=setInterval(()=>{if(S.screen!=="game"||levels[S.level].key!=="aroma"){stopAroma();return}S.needle+=S.dir*3.8;if(S.needle>=97){S.needle=97;S.dir=-1}if(S.needle<=3){S.needle=3;S.dir=1}let n=$("#needle");if(n)n.style.left=S.needle+"%"},45)}
function htmlAroma(){return `<div class="hint">指針進入中央亮色香氣區時，按下翻炒爆香。成功 ${S.aromaScore} / 3。</div><div class="meter"><div class="sweet-zone"></div><div id="needle" class="needle" style="left:${S.needle}%"></div></div><div class="score-dots">${[0,1,2].map(i=>`<span class="${i<S.aromaScore?"":"dim"}">🔥</span>`).join("")}</div><button id="stirBtn" class="btn primary" type="button">翻炒爆香</button><div class="status ${S.status==="good"?"good":S.status==="bad"?"bad":""}" style="margin-top:12px">${S.status==="good"?"香氣剛剛好。":S.status==="bad"?"時機差一點，再抓一次。":"等待指針進入香氣區。"}</div>`}
function startHeat(){if(S.heatTimer)return;S.heatTimer=setInterval(()=>{if(S.screen!=="game"||levels[S.level].key!=="heat"){stopHeat();return}let st=heatStages[S.heatStage];if(!st){stopHeat();return}let delta=[-1.8,.7,1.7,3.1][S.heatPower];let cool=S.heatTemp>25?-.28:0;S.heatTemp=Math.max(18,Math.min(100,S.heatTemp+delta+cool));let ok=S.heatTemp>=st.min&&S.heatTemp<=st.max;if(ok){S.heatProgress[S.heatStage]=Math.min(100,S.heatProgress[S.heatStage]+7);S.status="good";if(S.heatProgress[S.heatStage]>=100){S.heatStage++;S.status="good"}}else{S.heatProgress[S.heatStage]=Math.max(0,S.heatProgress[S.heatStage]-2);S.status=S.heatTemp>st.max?"bad":""}renderGame()},420)}
function htmlHeat(){let st=heatStages[S.heatStage]||heatStages.at(-1),left=st.min,w=st.max-st.min,tp=S.heatTemp,prog=S.heatProgress[Math.min(S.heatStage,2)]||100;let done=S.heatStage>=heatStages.length;return `<div class="hint">${done?"火候完成，準備擺盤。":"目前階段："+st.name+"，請讓溫度維持在綠色區間。"}</div><div class="heat-panel"><div class="thermo"><div class="heat-zone" style="left:${left}%;width:${w}%"></div><div class="temp" style="left:${tp}%"></div></div><div class="heat-buttons">${["關火","小火","中火","大火"].map((n,i)=>`<button class="${S.heatPower===i?"active":""}" type="button" data-heat="${i}">${n}</button>`).join("")}</div><div class="progress" style="margin:0"><span style="width:${prog}%"></span></div><div class="status ${S.status==="good"?"good":S.status==="bad"?"bad":""}">溫度 ${Math.round(S.heatTemp)}°C｜${done?"三段火候完成":st.name}</div></div>`}
function platingPlan(){let d=dish();return[{id:"base",label:"盤面鋪底",icon:d.ingredients.includes("白飯")||d.ingredients.includes("米飯")?"🍚":"🍽️",x:50,y:58,size:90},{id:"main",label:"主料理",icon:"🍲",x:50,y:45,size:78},{id:"side",label:"配菜",icon:icon(d.ingredients[1]),x:69,y:59,size:56},{id:"sauce",label:"醬汁光澤",icon:"🥄",x:33,y:62,size:52},{id:"garnish",label:"最後點綴",icon:"🌿",x:50,y:29,size:48}]}
function htmlPlate(){let plan=platingPlan(),tar=plan[S.plateIndex],ring=tar?`<div class="target-ring" style="left:calc(${tar.x}% - ${tar.size/2}px);top:calc(${tar.y}% - ${tar.size/2}px);width:${tar.size}px;height:${tar.size}px"></div>`:"";return `<div class="hint">${tar?`下一步：${tar.icon} ${tar.label}`:"擺盤完成，準備生成明信片。"}</div><div class="plate-zone">${ring}${S.placed.map(p=>`<div class="placed" style="left:calc(${p.x}% - ${p.size/2}px);top:calc(${p.y}% - ${p.size/2}px);width:${p.size}px;height:${p.size}px">${p.icon}</div>`).join("")}</div><div class="plating-tools">${plan.map(p=>`<button class="plating-token ${S.placed.some(x=>x.id===p.id)?"used":""}" type="button" data-plate="${p.id}">${p.icon}<br>${p.label}</button>`).join("")}</div><div class="status ${S.status==="good"?"good":S.status==="bad"?"bad":""}" style="margin-top:12px">${S.status==="bad"?"順序不對，請照提示擺放。":tar?"請點選正確擺盤元素。":"完美擺盤。"}</div>`}
function bindLevel(){let key=levels[S.level].key;if(key==="ingredients")document.querySelectorAll("[data-ing]").forEach(b=>b.onclick=()=>{let v=b.dataset.ing;S.chosen=S.chosen.includes(v)?S.chosen.filter(x=>x!==v):[...S.chosen,v];renderGame()});if(key==="cut")$("#cutBoard").onclick=()=>{let d=dish();if(S.cutTotal>=d.ingredients.length*2)return;S.cutMove=true;S.cutHits++;S.cutTotal++;if(S.cutHits>=2){S.cutHits=0;S.cutIndex=Math.min(S.cutIndex+1,d.ingredients.length-1)}renderGame();setTimeout(()=>{S.cutMove=false;renderGame()},260)};if(key==="aroma"){$("#stirBtn").onclick=()=>{let ok=S.needle>=43&&S.needle<=61;S.status=ok?"good":"bad";S.aromaScore=Math.max(0,Math.min(3,S.aromaScore+(ok?1:-1)));renderGame()};startAroma()}if(key==="heat"){document.querySelectorAll("[data-heat]").forEach(b=>b.onclick=()=>{S.heatPower=+b.dataset.heat;startHeat();renderGame()});startHeat()}if(key==="plate")document.querySelectorAll("[data-plate]").forEach(b=>b.onclick=()=>{let tar=platingPlan()[S.plateIndex];if(!tar)return;if(b.dataset.plate===tar.id){S.placed.push(tar);S.plateIndex++;S.status="good"}else S.status="bad";renderGame()})}
function renderGame(){let l=levels[S.level],d=dish();$("#gameDishPill").textContent=d.name;$("#levelImage").src=asset(l.img);$("#levelCount").textContent=`第 ${S.level+1} 關 / ${levels.length}`;$("#levelTitle").textContent=l.title;$("#levelHint").textContent=l.hint;$("#progressBar").style.width=Math.round(progress()*100)+"%";renderSteps();let html="";if(l.key==="ingredients")html=htmlIngredients();if(l.key==="cut")html=htmlCut();if(l.key==="aroma")html=htmlAroma();if(l.key==="heat")html=htmlHeat();if(l.key==="plate")html=htmlPlate();$("#levelContent").innerHTML=html;$("#prevBtn").disabled=S.level===0;$("#nextBtn").disabled=!canNext();$("#nextBtn").textContent=S.level===levels.length-1?"生成明信片":"下一關";bindLevel()}
function renderPostcard(){let d=dish(),msg=$("#messageInput").value.trim()||"今天完成了一道料理，把香氣和成就感一起收藏。";$("#postDishPill").textContent=d.name;$("#postTitle").textContent=d.name;$("#postMessage").textContent=msg;$("#postImage").src=asset(d.img);$("#postChips").innerHTML=d.ingredients.map(i=>`<span class="chip">${icon(i)} ${i}</span>`).join("")}
function next(){if(!canNext())return;if(S.level===levels.length-1){stopAroma();stopHeat();renderPostcard();setScreen("postcard")}else{S.level++;S.status="";renderGame()}}
function prev(){if(S.level<=0)return;S.level--;S.status="";renderGame()}
function loadImage(src){return new Promise((res,rej)=>{let img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=src})}
function round(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
function wrap(ctx,text,x,y,max,lh,lines){let chars=String(text).split(""),line="",out=[];for(let c of chars){let t=line+c;if(ctx.measureText(t).width>max&&line){out.push(line);line=c;if(out.length>=lines-1)break}else line=t}if(line&&out.length<lines)out.push(line);out.forEach((l,i)=>ctx.fillText(l,x,y+i*lh))}
async function downloadCard(type){let st=$("#downloadStatus"),d=dish(),msg=$("#messageInput").value.trim()||"今天完成了一道料理，把香氣和成就感一起收藏。";st.textContent="正在生成明信片...";st.className="status";let img=await loadImage(asset(d.img));let c=document.createElement("canvas"),ctx=c.getContext("2d");c.width=1400;c.height=900;ctx.fillStyle="#fffaf3";round(ctx,0,0,c.width,c.height,36);ctx.fill();for(let x=0;x<c.width;x+=72){ctx.fillStyle="#dc2626";ctx.fillRect(x,0,18,18);ctx.fillStyle="#fff";ctx.fillRect(x+18,0,18,18);ctx.fillStyle="#2563eb";ctx.fillRect(x+36,0,18,18);ctx.fillStyle="#fff";ctx.fillRect(x+54,0,18,18)}let grad=ctx.createLinearGradient(40,50,1360,850);grad.addColorStop(0,"#fff7ed");grad.addColorStop(1,"#e3f7ee");ctx.fillStyle=grad;round(ctx,44,56,1312,800,32);ctx.fill();ctx.setLineDash([18,12]);ctx.lineWidth=4;ctx.strokeStyle="#f59e0b";ctx.stroke();ctx.setLineDash([]);ctx.fillStyle="rgba(255,255,255,.84)";round(ctx,88,104,570,692,24);ctx.fill();ctx.fillStyle="#e15f30";ctx.font="900 28px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC','Microsoft JhengHei',sans-serif";ctx.fillText("CHEF POSTCARD",128,170);ctx.fillStyle="#201a17";ctx.font="900 64px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC','Microsoft JhengHei',sans-serif";wrap(ctx,d.name,128,265,470,70,2);ctx.fillStyle="#5f554f";ctx.font="30px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC','Microsoft JhengHei',sans-serif";wrap(ctx,msg,128,390,470,44,4);ctx.fillStyle="#fff0df";round(ctx,128,646,430,92,18);ctx.fill();ctx.fillStyle="#7c2d12";ctx.font="800 24px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC','Microsoft JhengHei',sans-serif";ctx.fillText("食材："+d.ingredients.join("、"),152,700);ctx.save();round(ctx,735,140,520,390,24);ctx.clip();ctx.drawImage(img,735,140,520,390);ctx.restore();ctx.fillStyle="#201a17";ctx.textAlign="center";ctx.font="900 34px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC','Microsoft JhengHei',sans-serif";ctx.fillText("主廚認證完成",995,612);ctx.fillStyle="#5f554f";ctx.font="26px -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC','Microsoft JhengHei',sans-serif";wrap(ctx,d.plate,785,672,430,38,3);let mime=type==="jpg"?"image/jpeg":"image/png",ext=type==="jpg"?"jpg":"png";c.toBlob(blob=>{let a=document.createElement("a"),url=URL.createObjectURL(blob);a.href=url;a.download=`${d.name}-主廚明信片.${ext}`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);st.textContent=`${ext.toUpperCase()} 明信片已下載。`;st.className="status good"},mime,type==="jpg"?.92:undefined)}
function init(){prepOptions();renderMenu();$("#homeStartBtn").onclick=()=>setScreen("menu");$("#menuStartBtn").onclick=()=>{resetRun();renderGame();setScreen("game")};$("#backMenuBtn").onclick=()=>{resetRun();renderMenu();setScreen("menu")};$("#prevBtn").onclick=prev;$("#nextBtn").onclick=next;$("#againBtn").onclick=()=>{resetRun();renderMenu();setScreen("menu")};$("#messageInput").oninput=renderPostcard;$("#downloadPngBtn").onclick=()=>downloadCard("png");$("#downloadJpgBtn").onclick=()=>downloadCard("jpg");setScreen("home")}
